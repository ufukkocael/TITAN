# TITAN V4 - Üretim Ortamı Konfigürasyonu
# Kullanım: python start.py --config config/production.yaml

server:
  host: "0.0.0.0"
  debug: false
  reload: false
  workers: 4  # Çok çekirdekli sistemler için

services:
  operator:
    port: 9001
    host: "titan-operator"
  programmer:
    port: 9002
    host: "titan-programmer"
  researcher:
    port: 9003
    host: "titan-researcher"
  companion:
    port: 9004
    host: "titan-companion"
  gateway:
    port: 9000
    host: "titan-gateway"
  orchestrator:
    port: 9005
    host: "titan-orchestrator"
  cloud_mock:
    port: 9100
    host: "titan-cloud"

redis:
  host: "redis-cluster.prod.internal"
  port: 6379
  password: "${REDIS_PASSWORD}"  # Environment variable
  db: 0
  ssl: true
  pool_size: 20

memory:
  path: "/data/titan_memory"
  max_size_mb: 8192  # 8GB
  backup_enabled: true
  backup_path: "/backup/titan_memory"

auth:
  jwt_secret: "${JWT_SECRET}"  # Environment variable - ZORUNLU!
  token_expiry: 7200  # 2 saat (daha güvenli)
  admin_user: "${ADMIN_USER}"
  admin_password: "${ADMIN_PASSWORD}"
  refresh_token_enabled: true

rate_limit:
  enabled: true
  max_requests: 1000
  window_seconds: 60
  redis_enabled: true  # Redis ile dağıtık rate limit

circuit_breaker:
  enabled: true
  failure_threshold: 10
  recovery_timeout: 60
  timeout: 30

logging:
  level: "WARNING"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "/var/log/titan/titan.log"
  console: false
  json_format: true  # JSON log formatı (ELK için)
  max_bytes: 10485760  # 10MB
  backup_count: 10

llm:
  provider: "groq"  # Üretimde Groq daha hızlı
  ollama_url: "http://ollama.internal:11434"
  ollama_model: "llama3:70b"
  groq_api_key: "${GROQ_API_KEY}"
  groq_model: "llama3-70b-8192"
  temperature: 0.5  # Daha tutarlı
  max_tokens: 2048
  cache_enabled: true
  cache_ttl: 3600

monitoring:
  metrics_enabled: true
  health_check_interval: 60
  alert_webhook: "${ALERT_WEBHOOK}"
  prometheus_enabled: true
  prometheus_port: 9090

features:
  websocket: true
  ssl: true
  ssl_cert: "/etc/ssl/titan/cert.pem"
  ssl_key: "/etc/ssl/titan/key.pem"
  cors_origins: ["https://titan.yourdomain.com"]
  rate_limit_strict: true
  audit_log: true